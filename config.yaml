port: 8080
admin_port: 9090

includes:
  - backends.yaml

health_check:
  type: tcp
  interval_sec: 10
  timeout_sec: 3
  unhealthy_threshold: 3
  healthy_threshold: 2

circuit_breaker:
  failure_threshold: 5
  cooldown_sec: 30

rate_limit:
  enabled: true
  rate_per_sec: 1000
  bucket: 2000

access_log:
  enabled: true
  file_path: logs/access.log
  max_hours: 168

backends: []

rules:
  - id: api-default
    domain: ""
    path_prefix: /api
    backend_group: api
    strategy: round_robin
    priority: 100
    strip_prefix: true

  - id: web-default
    path_prefix: /
    backend_group: web
    strategy: least_connections
    priority: 10
